services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: mongodb://mongo:27017/moviebooking
      JWT_SECRET: ${JWT_SECRET:-change-me-in-docker-compose}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      GNEWS_API_KEY: ${GNEWS_API_KEY:-}
      API_BASE_URL: http://localhost:5000
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5000
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  admin:
    build:
      context: ./admin
      args:
        VITE_API_BASE_URL: http://localhost:5000
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo-data:
  backend-uploads:
